{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>ToDo</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{% static 'ToDo/style.css' %}">
</head>
<body>
  <div class="container">
    <header>
        <h1>タスク編集</h1>
    </header>
    <main>
      <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" value="{{ task.title }}">
        <input type="text" name="reason" value="{{ task.reason }}">

        <button type="submit">更新</button>
      </form>

    </main>
  </div>
</body>
</html>
